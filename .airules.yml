version: 1
project:
  name: airules
  stack: generic
  language: typescript
targets:
  - claude
  - cursor
  - copilot
rules:
  style:
    prefer_functional: true
    naming_convention: camelCase
    import_style: named
    quote_style: double
  architecture:
    pattern: feature-based
    api_style: rest
  testing:
    framework: vitest
    style: arrange-act-assert
    require_tests_for: []
  git:
    commit_style: conventional
    branch_pattern: feature/*
    require_pr: true
  docs:
    require_jsdoc: false
    language: english
  security:
    no_secrets_in_code: true
  performance: {}
custom:
  - "Always use named exports (no default exports except CLI entry point)"
  - "All file I/O must use node:fs with proper error handling"
  - "Use biome for lint + format, never ESLint + Prettier"
  - "Prefer functional style — pure functions over classes"
  - "Never use `any` type — use `unknown` with type guards"
exclude:
  - node_modules
  - dist
  - coverage
